description = "Show SEO Page Creator Agent workflow and command order."
prompt = """
Read AGENT.md and summarize the recommended SEO Page Creator Agent flow:
onboard -> optional site scan -> cluster -> page -> edit-section -> rescore -> watcher.
Explain prerequisites for each command and where artifacts are stored.

For `/seo:page`, explain that Step 0A, Step 0B, Step 1, Step 2, Step 3, Step 4, Step 5, Step 6, Step 7, and Step 8 from
`workflows/13-cluster-strategy.md` must pass before page generation.

Step 0A Foundation must create the compact search-opportunity artifact with
`selectedTopic`, `topicBoundarySummary`, `candidateTopics`, `businessSideRelevance`,
`primarySearchProblem`, `searchProblemBoundarySummary`, `wrongPageRisk`,
`desiredOutcome`, `readerState`, `problemLanguage`, `relationshipCheck`,
`foundationVerdict`, and `mustCarryForward`. Explain that messy input requires 2-4
candidate topics, routed rejected inputs, and user clarification when the winner is
unclear. Mention that `problemLanguage` needs 8 cleaned natural phrases, at least 5-6
evidence-backed phrases with `cleanedPhrase`, `sourceRef`, `sourceType`, and
`sourceClass`, separate `search_surface` and `audience_language`, at least one
`audience_language` source when available, 6/8 phrases supporting
`primarySearchProblem`, and 0 contradictions. Business relevance is unclear is a
critical blocker.

Step 0B must freeze the selected opportunity as a Page Scope Contract with
`targetKeyword`, `targetQueryIntent`, `queryCluster`, `selectedOpportunity`,
`pageScopeSummary`, evidence-linked `uniqueContribution`, `mustCover`, routed
`mustNotCover`, `businessGoal`, `existingUrlAction`, `slugCandidate`, and
`contractHash`. Mention that Step 0B requires live keyword/search evidence, a light SERP overlap
check for clustering/splitting, routed candidate phrases, and a batch
duplicate check before any downstream V2 research, final copy, images, commits,
deploys, or publishing.

Step 1 must freeze the selected page's Page Job Contract as `pageJobContract`
before prewriting. It must include `step0BContractHash`, `pageJobHash`,
`pageJobStatement`, `audienceSentence`, `taskConstraints`, `successCriteria`,
`nonGoals`, `primaryHelpFormat`, `secondaryHelpFormats`, `primaryBusinessRole`,
`riskLevel`, `claimSensitivity`, `outcomeConsequence`, `evidenceBasis`,
`jobUniquenessCheck`, `pageJobVerdict`, and `inferenceRepairLog`. Explain that
Step 1 returns `return_to_0B` when the frozen page scope is wrong and prewriting
returns `return_to_step1` when the page job is wrong or incomplete.

Step 2 must freeze the selected page's Search Intent Contract as
`searchIntentContract` before prewriting. It must include `step0BContractHash`,
`pageJobHash`, `searchIntentHash`, `intentStatement`, `dominantBroadIntent`,
`coPrimaryBroadIntent`, `primaryDeeperIntent`, `projectSpecificIntentLabel`,
`depthLevel`, `depthStyle`, `satisfactionCondition`, `tooShallowIf`,
`wrongPageIf`, `recommendedPageType`, `dominantInternalContentFormat`,
`supportingContentFormats`, `lightSerpValidation`, `mixedIntentHandling`,
`pageJobAlignmentCheck`, `validatedIntentDecision`, `marketContextCheck`,
`aiOverviewIntentSignal`, `intentVerdict`, and `intentRepairLog`. Explain that
Step 2 uses a top 5 SERP light intent-pattern check, needs 3/5 support for a
normal pass, routes mixed intents as `adjacent` or `conflicting`, records whether
evidence `confirm`, `refine`, or `correct` the query-only hypothesis, and then
returns `continue_to_prewriting`, `return_to_step1`, `return_to_0B`, `ask_user`,
or `skip_page`.

Step 3 must freeze the selected page's Page Format Contract as
`pageFormatContract` before prewriting. It must include `step0BContractHash`,
`pageJobHash`, `searchIntentHash`, `pageFormatHash`, `primaryPageType`,
`secondaryPageTypeInfluences`, `primaryInternalContentFormat`,
`supportingFormatInfluences`, `supportingContentElements`,
`step2RecommendationFit`, `formatEvidenceBasis`, `scopeBoundaryCheck`,
`formatCompatibilityCheck`, `formatRiskCheck`, `formatUniquenessCheck`,
`businessConnectionBoundary`, `adjacentNeedRouting`, `rejectedPageTypes`,
`rejectedInternalFormats`, `formatDecisionStatement`, `step3OutputMustNotContain`,
`formatRepairLog`, `formatVerdict`, and `mustCarryForward`. Explain that Step 3
requires one fixed-enum page type, one fixed-enum internal format, 3-6 supporting
elements with `allowedScope` and `notAllowedScope`, adjacent need routing,
rejected wrong formats, inherited evidence only, and no outline/CTA/metadata/final
copy/image strategy work. It returns `continue_to_prewriting`,
`return_to_step2`, `return_to_step1`, `return_to_0B`, `ask_user`, or `skip_page`.

Step 4 must freeze the selected page's Next Action Contract as
`nextActionContract` before prewriting. It must include `step0BContractHash`,
`pageJobHash`, `searchIntentHash`, `pageFormatHash`, `nextActionHash`,
`userJourneyStage`, `secondaryJourneyStages`, `secondaryStageNotes`,
`primaryNextAction`, `secondaryNextActions`, `ctaStrength`,
`ctaStrengthMapping`, `ctaStrengthExceptionReason`,
`ctaStrengthExceptionEvidenceRefs`, `internalJourneyPath`,
`nextActionStatement`, `stageEvidenceBasis`, `nextActionEvidenceBasis`,
`step4InputFit`, `formatBoundaryCheck`, `businessRoleBoundaryCheck`,
`brandConnectionFit`, `sensitiveActionRiskCheck`, `internalDestinationCheck`,
`rejectedNextActions`, `nextActionUniquenessCheck`,
`step4OutputMustNotContain`, `nextActionRepairLog`, `nextActionVerdict`, and
`mustCarryForward`. Explain that Step 4 chooses one primary fixed-enum stage
(`learning`, `evaluation`, or `action`), up to 3 `secondaryJourneyStages`, one
fixed-enum CTA strength (`soft`, `medium`, or `direct`) that follows
`ctaStrengthMapping` unless exception fields are supported, exactly one
`primaryNextAction`, 1-3 `secondaryNextActions`, `finalCopyGuidance` with no
exact CTA wording, strict destination statuses (`existing_internal_destination`,
`missing_but_recommended`, `external_destination`, `ask_user_required`), light
evidence refs, `brandConnectionFit`, at least 2 rejected actions,
`nextActionUniquenessCheck`, and downstream `nextActionDeliveryProof`.
`brandConnectionFit` must be `direct_business_connection`,
`soft_brand_bridge`, `authority_building_internal_education`, or
`no_brand_connection_reader_first_justified`. It does
not define the business role, page type, internal format, outline, exact CTA
placement, CTA copy, metadata, final prose, image prompts, image manifest, or
publishing instructions.
It returns `continue_to_prewriting`, `return_to_step3`, `return_to_step2`,
`return_to_step1`, `return_to_0B`, `ask_user`, or `skip_page`.

Step 5 must freeze the selected page's SERP Competitor Analysis as
`serpCompetitorAnalysis` before
`current-page.lock`, prewriting, or V2 research. It must save
`serp-competitor-analysis.json` and `serp-competitor-analysis.md`, and include
`step0BContractHash`, `pageJobHash`, `searchIntentHash`, `pageFormatHash`,
`nextActionHash`, `serpCompetitorHash`, `serpContext`, `sourceRegistry`,
`primarySerpResults`, `reviewedCompetitors`, `supportingQuerySerpChecks`,
`serpFeatureInventory`, `marketSerpFitCheck`, `deviceSerpCheck`,
`mobileFirstSerpInterpretation`, `globalBenchmarkRelevanceCheck`,
`indiaGlobalInfluenceBoundary`, `serpCannibalizationCheck`,
`differentiationRequirement` when needed, `commercialSerpSignals`,
`serpQuestionAndRelatedSignals`, `serpStrengthLabel`, `minimumBarToMatch`,
`opportunityGapsToExplore`, `coveragePatterns`, `contentAnglePatterns`,
`depthBenchmark`, `trustSignalBenchmark`, `uxComponentBenchmark`,
`competitorStrengthsToRespect`, `competitorWeaknessesAndGaps`,
`serpInformedScopeProtection`, `directionValidation`,
`competitorImitationRisk`, `analysisConfidence`, `batchSerpIsolationCheck`,
`step5CompletenessChecklist`, `serpCompetitorSummaryStatement`,
`serpCompetitorVerdict`, and `mustCarryForward`. Explain that Step 5 must
collect the primary top 10 organic results when available, attempt top 5 direct
competitor reviews, complete at least 3 direct competitor reviews, preserve
original ranks, record `excludedResults`, run top 3 light SERP checks for 3-5
supporting queries, classify Reddit/forums/videos/official docs and global benchmarks
separately, use AI Overview only as answer-shape evidence, separate
`minimumBarToMatch` from `opportunityGapsToExplore`, run moderate
`serpCannibalizationCheck`, create `differentiationRequirement` for continuing
partial overlap, route synthesized strengths/gaps with `utilizationRouting` or
`pageImpact`, and avoid final outline, H1/H2/H3s, final factual claims, final
unique angle, final superiority component, CTA copy, metadata, image prompts, or
copied competitor material. It returns `continue_to_step6`, `return_to_step4`,
`return_to_step3`, `return_to_step2`, `return_to_step1`, `return_to_0B`,
`ask_user`, or `skip_page`. Downstream QA must include
`serpCompetitorDeliveryProof` and `differentiationDeliveryProof` when relevant.

Step 6 must freeze the selected page's Topic Research Bank as
`topicResearchBank` before Step 7, prewriting, V2 research artifacts, final copy,
images, commit, deploy, or publish. It must save `topic-research-bank.json` and
`topic-research-bank.md`, and include `step0BContractHash`, `pageJobHash`,
`searchIntentHash`, `pageFormatHash`, `nextActionHash`, `serpCompetitorHash`,
`topicResearchHash`, `researchDepthDecision`, `researchAgenda`,
`sourceRegistry`, `topicEvidenceSources`, `audienceSearchLanguageSources`,
`extractedFacts`, `agendaCoverage`, `step5CarryForwardCoverage`,
`researchBank`, `sourceConflictNotes`, `researchGaps`, `doNotUse`,
`mustCarryForward`, `researchCompletenessChecklist`,
`researchSummaryStatement`, and `topicResearchVerdict`. Explain that Step 6
declares research depth before source collection, enforces risk-tier source and
fact minimums, keeps competitor pages out of authoritative topic evidence,
separates topic evidence from audience/search-language evidence, evidence-links
examples/workflows/common mistakes/reader questions, requires local-market
evidence for India-sensitive claims, handles source conflicts, records weak or
unsafe material in `doNotUse`, prohibits copied source or competitor material,
and does not create final outline, H1/H2/H3s, final unique angle, required
superiority component, CTA copy, metadata, image prompts, final prose, citation
display strategy, or trust module design. It returns `continue_to_step7`,
`return_to_step5`, `return_to_step4`, `return_to_step3`, `return_to_step2`,
`return_to_step1`, `return_to_0B`, `ask_user`, or `skip_page`. Downstream QA
must include `topicResearchDeliveryProof` when relevant.

Step 7 must freeze Unique Angle And Information Gain as
`uniqueAngleInformationGain` before Step 8, prewriting, structure, final copy,
images, commit, deploy, or publish. It saves `unique-angle-information-gain.json`
and `unique-angle-information-gain.md`, freezes `uniqueAngleHash`, carries all
upstream hashes, and includes `primaryImprovementAngle`, 1-3
`supportingImprovementAngles`, `step5GapRouting`, `step6OpportunityRouting`,
`informationGainAssets`, `baselineToMatch`, `areasToExceed`,
`informationGainStatement`, `differentiationStatement`,
`whyThisPageDeservesToCompeteStatement`, `informationGainQualificationCheck`,
`formatCompatibilityCheck`, `safetyAndBrandFitCheck`, `originalityContract`,
`multiSurfaceEvidenceCoverage`, `uniqueAngleUniquenessCheck`,
`mustCarryForward`, `step7OutputMustNotContain`,
`step7CompletenessChecklist`, `uniqueAngleRepairLog`, and `uniqueAngleVerdict`.

Explain that Step 7 performs no new research. It requires one mandatory primary
asset, one mandatory supporting asset, and one conditional optional asset, all
with `accessibleContentFallback`. The primary needs at least 2 Step 5 refs and
3 Step 6 evidence items from at least 2 credible sources. It requires at least
2 `baselineToMatch` items and 5-7 distinct `areasToExceed`, the evidence +
synthesis + action test, multi-surface evidence, format/safety/brand fit, and
current-batch plus accessible-history uniqueness. It returns
`continue_to_step8`, `return_to_step6`, `return_to_step5`, `return_to_step4`,
`return_to_step3`, `return_to_step2`, `return_to_step1`, `return_to_0B`,
`ask_user`, or `skip_page`. It must not output final outline, headings, section
order, detailed asset content, final prose, CTA wording, metadata, image prompts,
citation-display strategy, new research, or unsupported claims. Downstream QA
must include `informationGainDeliveryProof` and every downstream artifact must
carry `uniqueAngleHash`.

Step 8 must freeze the SEO Content Brief as `seoContentBrief` before Step 9,
prewriting, structure, final copy, images, commit, deploy, or publish. It saves
`seo-content-brief.json` and `seo-content-brief.md`, freezes
`contentBriefHash`, carries `step0AHash`, `step0BHash`, `pageJobHash`,
`searchIntentHash`, `pageFormatHash`, `nextActionHash`, `serpCompetitorHash`,
`topicResearchHash`, and `uniqueAngleHash`, and includes
`contentBriefSummaryStatement`, `readerOutcomePromise`,
`provisionalWorkingTitle`, `targetWordCountContract`, `depthRequirements`,
`depthBoundaries`, `instructionRegistry`, `upstreamCoverageMatrix`,
`requiredInclusions`, `conditionalInclusions`, `exclusions`,
`queryCoverageContract`, `sourceUseGuidance`, `assetBriefingContract`,
`voiceAndQualityContract`, `readabilityAndScanabilityRequirements`,
`antiGenericContract`, `synthesisRequirement`, `brandFitBoundaries`,
`marketLocalizationRequirements`, `recencySensitivityCheck`,
`readerObjectionHandling`, `internalLinkGuidance`,
`practicalDeviceRequirements`, `minimumCompletenessStandard`,
`draftRepairGuidance`, `batchBriefIsolationCheck`,
`semanticBriefUniquenessCheck`, `contentBriefDeliveryProofRequirements`,
`mustCarryForward`, `step8OutputMustNotContain`,
`step8CompletenessChecklist`, `contentBriefRepairLog`, and
`contentBriefVerdict`.

Explain that Step 8 is a compiler, not an outline or draft step. It must not
start new research, change upstream strategy, invent missing evidence, create
final H1/H2/H3s, decide section order, write final prose, create metadata,
image prompts, exact CTA wording, or exact citation placement. It must use
`config/step8-practical-device-baselines.json`, enforce a hard
`minimumWordCount`, maintain strict Markdown parity for major decisions, block
generic brief logic through `antiGenericContract` and `synthesisRequirement`,
and prove page-specificity through `batchBriefIsolationCheck` and
`semanticBriefUniquenessCheck`. It returns `continue_to_step9`,
`repair_step8`, `return_to_step7`, `return_to_step6`, `return_to_step5`,
`return_to_step4`, `return_to_step3`, `return_to_step2`, `return_to_step1`,
`return_to_0B`, `return_to_onboarding`, `ask_user`, or `skip_page`.
Downstream QA must include `contentBriefDeliveryProof` and every Step 9 or later
artifact must carry `contentBriefHash`.

Step 9 must freeze the SEO Page Outline as `seoPageOutline` before Step 10,
final copy, images, commit, deploy, or publish. It saves
`seo-page-outline.json` and `seo-page-outline.md`, freezes `pageOutlineHash`,
carries all upstream hashes including `contentBriefHash`, and includes
`workingH1`, `pageFlowType`, `pageFlowReason`, `pageFlowStep8Refs`,
`readerJourneySummaryStatement`, `sectionSequenceRationale`,
`mainIntentVisibilityCheck`, `outlineSections`, `queryCoveragePlan`,
`assetPlacementPlan`, `internalLinkPlacementPlan`, `ctaPlacementPlan`,
`faqPlan`, `contentBriefDeliveryProof`, optional `step8RefinementPatch`,
`outlineOriginalityCheck`, `outlineScanabilityCheck`, `headingHierarchyCheck`,
`batchOutlineIsolationCheck`, `outlineDeliveryProofRequirements`,
`mustCarryForward`, `step9OutputMustNotContain`,
`step9CompletenessChecklist`, `step9RepairLog`, and `pageOutlineVerdict`.

Explain that Step 9 is the blueprint gate and performs no new research. Normal
pages use 8-14 H2 sections unless justified, and the main intent must be visible
in the first 1-2 H2 sections. Only H2s get `sectionId`; H3s are nested without
IDs. Every H2 must include `sectionRole`, `mappedStep8Refs`, `depthLevel`,
`depthReason`, `expectedTreatment`, `mappedDepthRequirementRefs`,
`contentObligations`, query mapping, claim/evidence notes, transition logic, and
scope boundaries when relevant. `faqPlan` is required as short or detailed
unless a strong evidence-backed exception supports none.

Step 9 must not output final paragraphs, exact CTA wording, metadata, image
prompts, exact asset rows or branches, citation display strategy, new facts, new
claims, copied competitor headings/tables/examples, or draft copy. It returns
`continue_to_step10`, `repair_step9`, `return_to_step8`, `return_to_step7`,
`return_to_step6`, `return_to_step5`, `return_to_step4`, `return_to_step3`,
`return_to_step2`, `return_to_step1`, `return_to_0B`, `ask_user`, or
`skip_page`. Downstream QA must include `pageOutlineDeliveryProof` or
`outlineDeliveryProof`, and every Step 10 or later artifact must carry
`pageOutlineHash`.
"""
