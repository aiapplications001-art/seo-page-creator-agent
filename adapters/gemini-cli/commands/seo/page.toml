description = "Generate one V2 content-quality page workflow."
prompt = """
Use AGENT.md and workflows/19-v2-content-quality.md.
This command is the default upgraded V2.1 content-quality page workflow.

Run the SEO Page Creator V2 flow for one page only.

Before preparing the V2 page workspace, enforce the cluster strategy foundation:
1. Read workflows/13-cluster-strategy.md.
2. Complete or verify Step 0A Foundation before keyword targeting. It must include selectedTopic, topicBoundarySummary, included/excluded subareas, candidateTopics, businessSideRelevance, deferredKeywordCandidates, deferredIntentSignals, primarySearchProblem, searchProblemBoundarySummary, wrongPageRisk, desiredOutcome, readerState, problemLanguage, relationshipCheck, foundationVerdict, and mustCarryForward.
3. For Step 0A, create 2-4 candidate topics when input is messy or broad, route rejected inputs, and ask the user when the winner is unclear. businessSideRelevance must be evidence-based; business relevance is unclear is a critical blocker.
4. Step 0A problemLanguage must include 8 cleaned natural user phrases, at least 5-6 evidence-backed phrases with cleanedPhrase, source excerpt, sourceRef, sourceType, and sourceClass. Separate search_surface from audience_language, require one audience_language source when available, require at least 6/8 phrases to support primarySearchProblem, allow at most 2/8 adjacent phrases, and allow 0 contradictions.
5. Complete Step 0B and freeze exactly one selected opportunity as the Page Scope Contract.
6. The Step 0B Page Scope Contract must include targetKeyword, targetQueryIntent, queryCluster, selectedOpportunity, pageScopeSummary, uniqueContribution, mustCover, mustNotCover, businessGoal, existingUrlAction, rough slugCandidate, and contractHash.
7. Step 0B must use live keyword/search evidence from at least two approved source types with one true search-demand source, run a light SERP overlap/page-type check for clustering and splitting, route every candidate phrase, force one fixed-enum primaryIntent, use fixed-enum pageType and primaryReaderStage, and run the batch duplicate check when relevant.
8. Complete Step 1 and freeze the Page Job Contract before prewriting. The pageJobContract must include step0BContractHash, pageJobHash, pageJobStatement, audience with audienceSentence, userTask with taskConstraints, successCriteria, and nonGoals, primaryHelpFormat, secondaryHelpFormats, userOutcome with outcomeConsequence, businessRole with primaryBusinessRole, riskLayer with riskLevel and claimSensitivity, evidenceBasis, jobUniquenessCheck, pageJobVerdict, and inferenceRepairLog.
9. Step 1 may infer from Step 0A and Step 0B but must not edit Step 0B. If Step 0B is wrong, return_to_0B with the exact issue. If prewriting finds the page job wrong or incomplete, return_to_step1.
10. Complete Step 2 and freeze the Search Intent Contract before prewriting. The searchIntentContract must include step0BContractHash, pageJobHash, searchIntentHash, intentStatement, dominantBroadIntent, coPrimaryBroadIntent, primaryDeeperIntent, projectSpecificIntentLabel, depthLevel, depthStyle, satisfactionCondition, tooShallowIf, wrongPageIf, recommendedPageType, dominantInternalContentFormat, supportingContentFormats, lightSerpValidation, mixedIntentHandling, pageJobAlignmentCheck, validatedIntentDecision, marketContextCheck, aiOverviewIntentSignal, intentVerdict, intentRepairLog, and mustCarryForward.
11. Step 2 must check top 5 SERP results lightly for intent pattern. Normal pass requires 3/5 support for dominantBroadIntent and primaryDeeperIntent; 2/5 may continue only with strong PAA, autocomplete, related searches, query cluster, or search-surface evidence. mixedIntentHandling must classify non-dominant intents as adjacent or conflicting. validatedIntentDecision must say confirm, refine, or correct. If Step 2 finds scope mismatch, return_to_0B; if it finds job mismatch, return_to_step1; otherwise action is continue_to_prewriting. If unresolved in batch, skip_page.
12. Complete Step 3 and freeze the Page Format Contract before prewriting. The pageFormatContract must include step0BContractHash, pageJobHash, searchIntentHash, pageFormatHash, primaryPageType, secondaryPageTypeInfluences, primaryInternalContentFormat, supportingFormatInfluences, supportingContentElements, step2RecommendationFit, formatEvidenceBasis, scopeBoundaryCheck, formatCompatibilityCheck, formatRiskCheck, formatUniquenessCheck, businessConnectionBoundary, adjacentNeedRouting, rejectedPageTypes, rejectedInternalFormats, formatDecisionStatement, step3OutputMustNotContain, formatRepairLog, formatVerdict, and mustCarryForward.
13. Step 3 must choose one fixed-enum primaryPageType and one fixed-enum primaryInternalContentFormat. Require 3-6 supportingContentElements mapped to Step 2 satisfaction needs, each with allowedScope and notAllowedScope. Route adjacent needs through adjacentNeedRouting, reject at least two plausible rejectedPageTypes and rejectedInternalFormats, prove step2RecommendationFit, scopeBoundaryCheck, formatCompatibilityCheck, formatRiskCheck, formatUniquenessCheck, and businessConnectionBoundary, and avoid outline, H2/H3, CTA strategy, metadata, competitor gaps, image prompts, or final copy in step3OutputMustNotContain. If Step 3 finds intent contradiction, return_to_step2; if page job conflict, return_to_step1; if scope conflict, return_to_0B; otherwise action is continue_to_prewriting. If unresolved in batch, skip_page.
14. Complete Step 4 and freeze the Next Action Contract before prewriting. The nextActionContract must include step0BContractHash, pageJobHash, searchIntentHash, pageFormatHash, nextActionHash, userJourneyStage, secondaryJourneyStages, secondaryStageNotes, primaryNextAction, secondaryNextActions, ctaStrength, ctaStrengthMapping, ctaStrengthExceptionReason, ctaStrengthExceptionEvidenceRefs, internalJourneyPath, nextActionStatement, stageEvidenceBasis, nextActionEvidenceBasis, step4InputFit, formatBoundaryCheck, businessRoleBoundaryCheck, brandConnectionFit, sensitiveActionRiskCheck, internalDestinationCheck, rejectedNextActions, nextActionUniquenessCheck, step4OutputMustNotContain, nextActionRepairLog, nextActionVerdict, and mustCarryForward.
15. Step 4 must choose one primary fixed-enum userJourneyStage from learning, evaluation, or action, allow up to 3 secondaryJourneyStages, and choose one fixed-enum ctaStrength from soft, medium, or direct. ctaStrength must follow ctaStrengthMapping unless ctaStrengthExceptionReason and ctaStrengthExceptionEvidenceRefs justify an exception. Require exactly one primaryNextAction, 1-3 secondaryNextActions, finalCopyGuidance and evidence refs for every action, an internalJourneyPath, strict destination statuses existing_internal_destination, missing_but_recommended, external_destination, or ask_user_required, brandConnectionFit with one fixed label: direct_business_connection, soft_brand_bridge, authority_building_internal_education, or no_brand_connection_reader_first_justified, at least two rejectedNextActions, nextActionUniquenessCheck, and inherited evidence only from Step 0B, Step 1, Step 2, Step 3, and known site inventory or conversion destinations. Do not define business role, page type, internal format, outline, exact CTA placement, CTA copy, metadata, final prose, image prompts, image manifest, or publishing instructions in step4OutputMustNotContain. If Step 4 finds format conflict, return_to_step3; if stage or intent conflict, return_to_step2; if business-role conflict, return_to_step1; if scope conflict, return_to_0B; otherwise action is continue_to_prewriting. If unresolved in batch, skip_page.
16. Complete Step 5 and freeze the SERP Competitor Analysis before current-page.lock, prewriting, or V2 research. The serpCompetitorAnalysis must save serp-competitor-analysis.json and serp-competitor-analysis.md and include step0BContractHash, pageJobHash, searchIntentHash, pageFormatHash, nextActionHash, serpCompetitorHash, serpContext, sourceRegistry, primarySerpResults, reviewedCompetitors, supportingQuerySerpChecks, serpFeatureInventory, marketSerpFitCheck, deviceSerpCheck, mobileFirstSerpInterpretation, globalBenchmarkRelevanceCheck, indiaGlobalInfluenceBoundary, serpCannibalizationCheck, optional differentiationRequirement, commercialSerpSignals, serpQuestionAndRelatedSignals, serpStrengthLabel, minimumBarToMatch, opportunityGapsToExplore, coveragePatterns, contentAnglePatterns, depthBenchmark, trustSignalBenchmark, uxComponentBenchmark, competitorStrengthsToRespect, competitorWeaknessesAndGaps, serpInformedScopeProtection, directionValidation, competitorImitationRisk, analysisConfidence, batchSerpIsolationCheck, step5CompletenessChecklist, serpCompetitorSummaryStatement, serpCompetitorVerdict, and mustCarryForward.
17. Step 5 must collect primary top 10 organic results when available, attempt top 5 direct competitor reviews, complete at least 3 direct competitor reviews, preserve original ranks, record excludedResults, run top 3 light SERP checks for 3-5 important supporting queries, keep Reddit/forums/videos/official docs and global benchmarks separately classified, use AI Overview only as answer-shape evidence, separate minimumBarToMatch from opportunityGapsToExplore, run moderate serpCannibalizationCheck, create differentiationRequirement for continuing partial overlap, route synthesized strengths/gaps with utilizationRouting or pageImpact, and avoid final outline, H1/H2/H3s, final factual claims, unique angle, final superiority component, CTA copy, metadata, image prompts, or copied competitor material. Step 5 action is continue_to_step6, return_to_step4, return_to_step3, return_to_step2, return_to_step1, return_to_0B, ask_user, or skip_page.
18. Complete Step 6 and freeze the Topic Research Bank before Step 7, prewriting, V2 research artifacts, final-copy-draft, images, commit, deploy, or publish. The topicResearchBank must save topic-research-bank.json and topic-research-bank.md and include step0BContractHash, pageJobHash, searchIntentHash, pageFormatHash, nextActionHash, serpCompetitorHash, topicResearchHash, researchDepthDecision, researchAgenda, sourceRegistry, topicEvidenceSources, audienceSearchLanguageSources, extractedFacts, agendaCoverage, step5CarryForwardCoverage, researchBank, sourceConflictNotes, researchGaps, doNotUse, mustCarryForward, researchCompletenessChecklist, researchSummaryStatement, and topicResearchVerdict.
19. Step 6 must declare researchDepthDecision before source collection, enforce risk-tier source and fact minimums, keep competitor pages out of authoritative topic evidence, separate topicEvidenceSources from audienceSearchLanguageSources, ensure audience/search-language evidence is not allowed for medical/safety/factual claims by itself, evidence-link examples/workflows/common mistakes/reader questions, require local-market evidence for India-sensitive claims, handle sourceConflictNotes, record weak or unsafe material in doNotUse, prohibit copied source or competitor material, and avoid final outline, H1/H2/H3s, final unique angle, required superiority component, CTA copy, metadata, image prompts, final prose, citation display strategy, and trust module design. Step 6 action is continue_to_step7, return_to_step5, return_to_step4, return_to_step3, return_to_step2, return_to_step1, return_to_0B, ask_user, or skip_page.
20. Complete Step 7 and freeze Unique Angle And Information Gain before Step 8. Save unique-angle-information-gain.json and unique-angle-information-gain.md, freeze uniqueAngleHash, and create uniqueAngleInformationGain with all upstream hashes, primaryImprovementAngle, 1-3 supportingImprovementAngles, step5GapRouting, step6OpportunityRouting, informationGainAssets, baselineToMatch, areasToExceed, informationGainStatement, differentiationStatement, whyThisPageDeservesToCompeteStatement, informationGainQualificationCheck, formatCompatibilityCheck, safetyAndBrandFitCheck, originalityContract, multiSurfaceEvidenceCoverage, uniqueAngleUniquenessCheck, mustCarryForward, step7OutputMustNotContain, step7CompletenessChecklist, uniqueAngleRepairLog, and uniqueAngleVerdict.
21. Step 7 performs no new research. Require one mandatory primary asset, one mandatory supporting asset, and one conditional optional asset with accessibleContentFallback. The primary needs at least 2 Step 5 refs and 3 Step 6 evidence items from at least 2 credible sources. Require at least 2 baselineToMatch items and 5-7 distinct areasToExceed, evidence + synthesis + action qualification, multi-surface evidence, format/safety/brand fit, and batch/history uniqueness. Step 7 action is continue_to_step8, return_to_step6, return_to_step5, return_to_step4, return_to_step3, return_to_step2, return_to_step1, return_to_0B, ask_user, or skip_page.
22. Complete Step 8 and freeze SEO Content Brief before Step 9 or downstream generation. Save seo-content-brief.json and seo-content-brief.md with strict Markdown parity, freeze contentBriefHash, and create seoContentBrief with step0AHash, step0BHash, pageJobHash, searchIntentHash, pageFormatHash, nextActionHash, serpCompetitorHash, topicResearchHash, uniqueAngleHash, contentBriefSummaryStatement, readerOutcomePromise, targetWordCountContract with hard minimumWordCount, depthRequirements, depthBoundaries, instructionRegistry, upstreamCoverageMatrix, sourceUseGuidance, assetBriefingContract, voiceAndQualityContract, readabilityAndScanabilityRequirements, antiGenericContract, synthesisRequirement, brandFitBoundaries, recencySensitivityCheck, practicalDeviceRequirements from config/step8-practical-device-baselines.json, batchBriefIsolationCheck, semanticBriefUniquenessCheck, contentBriefDeliveryProofRequirements, step8OutputMustNotContain, step8CompletenessChecklist, and contentBriefVerdict.
23. Step 8 is a compiler and must not start new research, change upstream strategy, invent missing evidence, create final H1/H2/H3s, decide section order, write final prose, create metadata, image prompts, exact CTA wording, or exact citation placement. Step 8 action is continue_to_step9, repair_step8, return_to_step7, return_to_step6, return_to_step5, return_to_step4, return_to_step3, return_to_step2, return_to_step1, return_to_0B, return_to_onboarding, ask_user, or skip_page.
24. Complete Step 9 and freeze SEO Page Outline before Step 10 or downstream generation. Save seo-page-outline.json and seo-page-outline.md with strict Markdown parity, freeze pageOutlineHash, and create seoPageOutline with all upstream hashes including contentBriefHash, workingH1, pageFlowType, pageFlowReason, pageFlowStep8Refs, readerJourneySummaryStatement, sectionSequenceRationale, mainIntentVisibilityCheck, outlineSections, queryCoveragePlan, assetPlacementPlan, internalLinkPlacementPlan, ctaPlacementPlan, faqPlan, contentBriefDeliveryProof, step8RefinementPatch when needed, outlineOriginalityCheck, outlineScanabilityCheck, headingHierarchyCheck, batchOutlineIsolationCheck, outlineDeliveryProofRequirements, step9OutputMustNotContain, step9CompletenessChecklist, and pageOutlineVerdict.
25. Step 9 is the blueprint gate and must not start new research, write final paragraphs, exact CTA wording, metadata, image prompts, exact asset rows or branches, citation display strategy, new facts, new claims, copied competitor headings/tables/examples, or draft copy. Use one pageFlowType with reason and Step 8 refs. Normal pages use 8-14 H2 outlineSections unless justified, and the main intent must be visible in the first 1-2 H2 sections. Only H2s get sectionId. Every H2 must include sectionRole, mappedStep8Refs, depthLevel, depthReason, expectedTreatment, mappedDepthRequirementRefs, contentObligations, query mapping, claim/evidence notes, transition logic, and scope boundaries when relevant. FAQ is required as short or detailed unless a strong evidence-backed exception supports none. Step 9 action is continue_to_step10, repair_step9, return_to_step8, return_to_step7, return_to_step6, return_to_step5, return_to_step4, return_to_step3, return_to_step2, return_to_step1, return_to_0B, ask_user, or skip_page.
26. Complete Step 10 and freeze SEO First Draft before Step 11 or downstream generation. Save seo-first-draft.json and seo-first-draft.md with strict Markdown parity, freeze firstDraftHash, and create seoFirstDraft with all upstream hashes including contentBriefHash and pageOutlineHash, draftSummaryStatement, h1, wordCountContract, section-by-section draftSections, introductionQualityGate, sectionExpansionGate, draftCompletenessProof, requiredAssetDelivery, draftClaimSafetyCheck, naturalQueryCoverageCheck, draftReadabilityScanabilityGate, faqDraftDelivery, ctaInternalLinkDelivery, voiceAndBrandFitCheck, draftUniquenessCheck, antiGenericDraftGate, firstDraftDeliveryProofRequirements, step10OutputMustNotContain, step10CompletenessChecklist, and firstDraftVerdict.
27. Step 10 is the drafting gate and must not change outline structure, start new research, create metadata, finalize citation display, create image prompts, perform final SEO optimization, add new factual claims, or leave placeholders. Every draftSections item must include actual draft copy, sectionId, heading, outline refs, evidence refs when required, depth proof, examples used, fulfilled obligations, and relevant claim/CTA/link notes. High-depth, safety, recommendation, comparison, troubleshooting, example-heavy, asset/component, claim-heavy, factual, medical, finance, legal, product, market, pricing, or safety sections require evidence refs. The intro must pass introductionQualityGate; high-depth/core sections must pass sectionExpansionGate; required assets, planned FAQ answers, and draft CTA/internal-link copy must be visible. antiGenericDraftGate blocks placeholder prose like "This section should explain", "Use this section to", "It is important to", vague "choose the right product", or contextless "consult a professional". firstDraftVerdict may be pass, narrow pass_with_warnings, fail, or ask_user; Step 10 action is continue_to_step11, repair_step10, return_to_step9, return_to_step8, return_to_step7, return_to_step6, return_to_step5, return_to_step4, return_to_step3, return_to_step2, return_to_step1, return_to_0B, ask_user, or skip_page.
28. No downstream work may start before 0A, 0B, Step 1, Step 2, Step 3, Step 4, Step 5, Step 6, Step 7, Step 8, Step 9, and Step 10 pass: no Step 11 SEO optimization, final-copy-draft, page packet, images, commit, deploy, publish, or future-page assets.
29. Carry Step 0A foundationVerdict and mustCarryForward plus Step 0B contractHash, step0BContractHash, pageJobHash, searchIntentHash, pageFormatHash, nextActionHash, serpCompetitorHash, topicResearchHash, uniqueAngleHash, contentBriefHash, pageOutlineHash, and firstDraftHash into downstream artifacts. Regenerate the owner step when a frozen assumption changes. Step 7 must not output final outline, headings, section order, detailed asset content, final prose, CTA wording, metadata, image prompts, citation-display strategy, new research, or unsupported claims. Step 8 must not output final headings, detailed outline, final copy, metadata, image prompts, new research, keyword-density requirements, or copied source/competitor structure. Step 9 must not output final paragraphs, exact CTA wording, metadata, image prompts, exact asset rows/branches, citation display strategy, new facts, copied source/competitor structure, or draft copy. Step 10 must not output final SEO title/meta, final schema, image prompts, new research, unsupported claims, hidden outline changes, or placeholders. Final copy/page-packet QA must include nextActionDeliveryProof, serpCompetitorDeliveryProof, differentiationDeliveryProof, topicResearchDeliveryProof, informationGainDeliveryProof, contentBriefDeliveryProof, pageOutlineDeliveryProof, and firstDraftDeliveryProof when relevant.

Create/check required V2 artifacts with:
seo-agent v2 prepare-page --cluster <cluster-slug> --page-id <page-id> --page-type <page-type>

Then, as the host agent:
1. Continue from the frozen Step 5 SERP Competitor Analysis and Step 6 Topic Research Bank, then do deeper live SERP research and fill the SERP Research Ledger Gate.
2. Review social/video assets and fill the Social/Video Research Gate.
3. Ask for or confirm audience definition, narrative style, reader takeaway, objections, and CTA connection.
4. Fill the Narrative Brief Gate.
5. Fill human-editorial-brief.json/md with the category-manager-with-editorial-empathy voice, depth strategy, examples, decision framework, common mistakes, not-right-for-you guidance, brand POV, and final human closing plan.
6. Read pageStructure.intentPattern, pageStructure.structureVariant, and the exact pageStructure.sections. Do not assume globally fixed section IDs such as S3_context or S4_main_content.
7. Fill claim-first-section-plan.json/md so every generated visible section has a claim, reader question, evidence need aligned to section.evidenceNeeded, example/tradeoff, caveat, decision purpose, and transition purpose.
8. Fill research-extraction-matrix.json, competitor-depth-delta.json, audience-pain-point-ledger.json, pre-draft-synthesis-brief.json, pre-draft-quality-brief.json, and depth-score.json before writing final copy. Match section evidence budgets to each generated section.evidenceBudget.
9. In pre-draft-quality-brief.json, prove sub-intent coverage, diagnostic depth, India or market specificity, safety/trust requirements, a standout element, brand connection, publish-worthiness, SERP superiority, AI Overview/extractable answer targets, internal links, and researchDerivedStructurePlan. Publish-worthiness requires real reader questions, recommendation sanity checks, claim-risk planning, troubleshooting, and honest brand CTA fit. Weak filler such as "What is this?", "Recommend good products", "Cite claims", or "Help if it gets worse" is invalid. Each publish-worthiness item must include sourceRefs, mappedSectionId, whyThisMatters, and finalCopyUse.
10. For SERP Superiority, score the primary keyword top 5 competitors, review top 3 pages for at least one secondary keyword or long-tail variant, include Reddit/forum/video/PAA gaps, inspect AI Overview weaknesses when available, use trust/citation sources for skincare/medical/safety claims, prove superiority on the top 4 intent dimensions, require 1 custom superiority component, and plan 5 differentiated visible improvements.
11. For Research-Derived Structure, make the primary search intent visible within the first 3 visible sections, link normal sections to at least 2 evidence refs, link decision tools/matrices/comparisons/troubleshooting/FAQs/superiority components/CTA structure to at least 3 evidence refs, include audience-language refs for objections/mistakes/troubleshooting/FAQs, include SERP competitor gap refs for differentiation claims, and prove the structure differs from current batch and historical pages. Shared body section patterns are forbidden.
12. Run seo-agent v2 validate-human and repair the human editorial artifacts if it fails.
13. Fill the Citation Set Gate.
14. Run seo-agent v2 validate-gates.
15. Run seo-agent v2 validate-depth. If it fails, add new research before rewriting prose.
16. Fill final-copy-draft.json with adapter-written, evidence-backed section prose for the exact generated section IDs. Include superiorityProof, structurePlanDeliveryProof, and whyThisDeservesToRank, proving the top-4 intent wins, superiority component, 5 differentiated improvements, 3 extractable answer blocks, visible citation/source handling, primary concern, high-impact structure components, and promised visible outputs made it into final copy. Do not rely on seo-agent final-copy expand to author prose.
17. Run seo-agent final-copy expand only when hard gates, validate-human, validate-depth, and final-copy-draft validation pass.
18. Produce the editorial QA report and run seo-agent v2 qa. Include a short human editorial summary in QA, not the full internal brief.
19. Run the image manifest workflow after content and depth validation pass.

Show the editor only the final page packet, editorial QA report, and image manifest unless debug artifacts are requested.
Use seo-agent v2 debug-bundle only for troubleshooting.
"""
